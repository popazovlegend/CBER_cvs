<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цифровые конспекты</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Helper to render Lucide icons using the vanilla library
        const IconWrapper = ({ name, size = 24, className, ...props }) => {
            if (!window.lucide) return null;
            
            // Convert PascalCase to camelCase for lucide.icons lookup
            const iconKey = name.charAt(0).toLowerCase() + name.slice(1);
            const icon = window.lucide.icons[iconKey];
            
            if (!icon) {
                console.warn(`Icon ${name} not found`);
                return <span>?</span>;
            }

            const svg = icon.toSvg({
                width: size,
                height: size,
                class: className,
                ...props
            });

            return <span dangerouslySetInnerHTML={{ __html: svg }} style={{ display: 'inline-flex', alignItems: 'center' }} />;
        };

        // Create components for each icon used
        const Upload = (props) => <IconWrapper name="Upload" {...props} />;
        const Search = (props) => <IconWrapper name="Search" {...props} />;
        const BookOpen = (props) => <IconWrapper name="BookOpen" {...props} />;
        const Users = (props) => <IconWrapper name="Users" {...props} />;
        const Star = (props) => <IconWrapper name="Star" {...props} />;
        const Eye = (props) => <IconWrapper name="Eye" {...props} />;
        const FileText = (props) => <IconWrapper name="FileText" {...props} />;
        const Brain = (props) => <IconWrapper name="Brain" {...props} />;
        const Filter = (props) => <IconWrapper name="Filter" {...props} />;

        const StudentNotesApp = () => {
            const [notes, setNotes] = useState([
                {
                id: 1,
                title: 'Квадратные уравнения',
                subject: 'Математика',
                group: '9А класс',
                author: 'Иван П.',
                date: '2024-12-15',
                rating: 4.5,
                views: 45,
                processed: true,
                content: 'Квадратное уравнение имеет вид ax² + bx + c = 0. Для решения используется дискриминант D = b² - 4ac...'
                },
                {
                id: 2,
                title: 'Фотосинтез',
                subject: 'Биология',
                group: '10Б класс',
                author: 'Мария К.',
                date: '2024-12-18',
                rating: 5.0,
                views: 78,
                processed: true,
                content: 'Фотосинтез - процесс образования органических веществ из CO₂ и H₂O на свету в хлоропластах...'
                },
                {
                id: 3,
                title: 'Великая французская революция',
                subject: 'История',
                group: '8В класс',
                author: 'Алексей Н.',
                date: '2024-12-20',
                rating: 4.2,
                views: 32,
                processed: true,
                content: 'Революция началась в 1789 году. Основные причины: экономический кризис, неравенство сословий...'
                }
            ]);

            const [activeTab, setActiveTab] = useState('browse');
            const [selectedSubject, setSelectedSubject] = useState('Все');
            const [searchQuery, setSearchQuery] = useState('');
            const [uploadedFile, setUploadedFile] = useState(null);
            const [processing, setProcessing] = useState(false);
            const [recognizedText, setRecognizedText] = useState('');
            const [newNote, setNewNote] = useState({
                title: '',
                subject: 'Математика',
                group: '',
                author: ''
            });

            const subjects = ['Все', 'Математика', 'Физика', 'Химия', 'Биология', 'История', 'Литература', 'Английский язык'];

            const filteredNotes = notes.filter(note => {
                const matchesSubject = selectedSubject === 'Все' || note.subject === selectedSubject;
                const matchesSearch = note.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                    note.content.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesSubject && matchesSearch;
            });

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    setUploadedFile(event.target.result);
                };
                reader.readAsDataURL(file);
                }
            };

            const recognizeText = async () => {
                if (!uploadedFile) return;

                setProcessing(true);
                try {
                const base64Data = uploadedFile.split(',')[1];
                
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                    'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 1000,
                    messages: [
                        {
                        role: 'user',
                        content: [
                            {
                            type: 'image',
                            source: {
                                type: 'base64',
                                media_type: 'image/jpeg',
                                data: base64Data
                            }
                            },
                            {
                            type: 'text',
                            text: 'Пожалуйста, распознай и перепиши весь текст из этого рукописного конспекта. Сохрани структуру и форматирование. Если есть формулы или диаграммы, опиши их.'
                            }
                        ]
                        }
                    ]
                    })
                });

                const data = await response.json();
                const text = data.content
                    .filter(item => item.type === 'text')
                    .map(item => item.text)
                    .join('\n');
                
                setRecognizedText(text);
                } catch (error) {
                console.error('Ошибка распознавания:', error);
                setRecognizedText('Ошибка при распознавании текста. Попробуйте еще раз.');
                } finally {
                setProcessing(false);
                }
            };

            const saveNote = () => {
                if (newNote.title && newNote.group && newNote.author && recognizedText) {
                const note = {
                    id: notes.length + 1,
                    title: newNote.title,
                    subject: newNote.subject,
                    group: newNote.group,
                    author: newNote.author,
                    date: new Date().toISOString().split('T')[0],
                    rating: 0,
                    views: 0,
                    processed: true,
                    content: recognizedText
                };
                setNotes([note, ...notes]);
                
                // Сброс формы
                setUploadedFile(null);
                setRecognizedText('');
                setNewNote({ title: '', subject: 'Математика', group: '', author: '' });
                setActiveTab('browse');
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
                <div className="max-w-7xl mx-auto p-6">
                    {/* Заголовок */}
                    <div className="bg-white rounded-xl shadow-lg p-6 mb-6">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center space-x-3">
                        <div className="bg-indigo-600 p-3 rounded-lg">
                            <BookOpen className="text-white" size={32} />
                        </div>
                        <div>
                            <h1 className="text-3xl font-bold text-gray-800">Цифровые конспекты</h1>
                            <p className="text-gray-600">Платформа для обмена и распознавания учебных материалов</p>
                        </div>
                        </div>
                        <div className="flex items-center space-x-4 text-sm text-gray-600">
                        <div className="flex items-center space-x-1">
                            <FileText size={18} />
                            <span>{notes.length} конспектов</span>
                        </div>
                        <div className="flex items-center space-x-1">
                            <Users size={18} />
                            <span>Открытая база</span>
                        </div>
                        </div>
                    </div>
                    </div>

                    {/* Навигация */}
                    <div className="bg-white rounded-xl shadow-lg mb-6">
                    <div className="flex border-b">
                        <button
                        onClick={() => setActiveTab('browse')}
                        className={`flex-1 py-4 px-6 font-medium transition ${
                            activeTab === 'browse'
                            ? 'text-indigo-600 border-b-2 border-indigo-600'
                            : 'text-gray-600 hover:text-indigo-600'
                        }`}
                        >
                        <div className="flex items-center justify-center space-x-2">
                            <Search size={20} />
                            <span>Найти конспект</span>
                        </div>
                        </button>
                        <button
                        onClick={() => setActiveTab('upload')}
                        className={`flex-1 py-4 px-6 font-medium transition ${
                            activeTab === 'upload'
                            ? 'text-indigo-600 border-b-2 border-indigo-600'
                            : 'text-gray-600 hover:text-indigo-600'
                        }`}
                        >
                        <div className="flex items-center justify-center space-x-2">
                            <Upload size={20} />
                            <span>Загрузить конспект</span>
                        </div>
                        </button>
                    </div>

                    {/* Поиск и просмотр */}
                    {activeTab === 'browse' && (
                        <div className="p-6">
                        {/* Поиск */}
                        <div className="mb-6">
                            <div className="relative">
                            <Search className="absolute left-4 top-3.5 text-gray-400" size={20} />
                            <input
                                type="text"
                                placeholder="Поиск по конспектам..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                            />
                            </div>
                        </div>

                        {/* Фильтр по предметам */}
                        <div className="mb-6">
                            <div className="flex items-center space-x-2 mb-3">
                            <Filter size={18} className="text-gray-600" />
                            <span className="font-medium text-gray-700">Предметы:</span>
                            </div>
                            <div className="flex flex-wrap gap-2">
                            {subjects.map(subject => (
                                <button
                                key={subject}
                                onClick={() => setSelectedSubject(subject)}
                                className={`px-4 py-2 rounded-lg font-medium transition ${
                                    selectedSubject === subject
                                    ? 'bg-indigo-600 text-white'
                                    : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                }`}
                                >
                                {subject}
                                </button>
                            ))}
                            </div>
                        </div>

                        {/* Список конспектов */}
                        <div className="space-y-4">
                            {filteredNotes.map(note => (
                            <div key={note.id} className="bg-gradient-to-r from-white to-gray-50 border border-gray-200 rounded-xl p-5 hover:shadow-md transition">
                                <div className="flex items-start justify-between mb-3">
                                <div className="flex-1">
                                    <div className="flex items-center space-x-3 mb-2">
                                    <h3 className="text-xl font-bold text-gray-800">{note.title}</h3>
                                    {note.processed && (
                                        <span className="flex items-center space-x-1 px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">
                                        <Brain size={14} />
                                        <span>Распознано</span>
                                        </span>
                                    )}
                                    </div>
                                    <div className="flex items-center space-x-4 text-sm text-gray-600">
                                    <span className="font-medium text-indigo-600">{note.subject}</span>
                                    <span>•</span>
                                    <span>{note.group}</span>
                                    <span>•</span>
                                    <span>Автор: {note.author}</span>
                                    <span>•</span>
                                    <span>{note.date}</span>
                                    </div>
                                </div>
                                <div className="flex items-center space-x-4 text-sm text-gray-600">
                                    <div className="flex items-center space-x-1">
                                    <Star className="text-yellow-500" size={16} fill="currentColor" />
                                    <span>{note.rating.toFixed(1)}</span>
                                    </div>
                                    <div className="flex items-center space-x-1">
                                    <Eye size={16} />
                                    <span>{note.views}</span>
                                    </div>
                                </div>
                                </div>
                                <p className="text-gray-700 line-clamp-2 mb-3">{note.content}</p>
                                <button className="text-indigo-600 font-medium hover:text-indigo-700 transition">
                                Открыть конспект →
                                </button>
                            </div>
                            ))}
                        </div>

                        {filteredNotes.length === 0 && (
                            <div className="text-center py-12 text-gray-500">
                            <Search size={48} className="mx-auto mb-4 opacity-50" />
                            <p>Конспекты не найдены</p>
                            </div>
                        )}
                        </div>
                    )}

                    {/* Загрузка конспекта */}
                    {activeTab === 'upload' && (
                        <div className="p-6">
                        <div className="max-w-3xl mx-auto">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6">Загрузить новый конспект</h2>

                            {/* Форма */}
                            <div className="space-y-4 mb-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                Название конспекта
                                </label>
                                <input
                                type="text"
                                value={newNote.title}
                                onChange={(e) => setNewNote({...newNote, title: e.target.value})}
                                placeholder="Например: Теорема Пифагора"
                                className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                />
                            </div>

                            <div className="grid grid-cols-3 gap-4">
                                <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Предмет
                                </label>
                                <select
                                    value={newNote.subject}
                                    onChange={(e) => setNewNote({...newNote, subject: e.target.value})}
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                >
                                    {subjects.slice(1).map(subject => (
                                    <option key={subject} value={subject}>{subject}</option>
                                    ))}
                                </select>
                                </div>

                                <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Класс/Группа
                                </label>
                                <input
                                    type="text"
                                    value={newNote.group}
                                    onChange={(e) => setNewNote({...newNote, group: e.target.value})}
                                    placeholder="9А класс"
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                />
                                </div>

                                <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Автор
                                </label>
                                <input
                                    type="text"
                                    value={newNote.author}
                                    onChange={(e) => setNewNote({...newNote, author: e.target.value})}
                                    placeholder="Ваше имя"
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500"
                                />
                                </div>
                            </div>
                            </div>

                            {/* Загрузка изображения */}
                            <div className="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center mb-6">
                            {!uploadedFile ? (
                                <div>
                                <Upload className="mx-auto mb-4 text-gray-400" size={48} />
                                <p className="text-gray-600 mb-4">Загрузите фото конспекта для распознавания</p>
                                <label className="inline-block px-6 py-3 bg-indigo-600 text-white rounded-lg cursor-pointer hover:bg-indigo-700 transition">
                                    Выбрать файл
                                    <input
                                    type="file"
                                    accept="image/*"
                                    onChange={handleFileUpload}
                                    className="hidden"
                                    />
                                </label>
                                </div>
                            ) : (
                                <div>
                                <img src={uploadedFile} alt="Конспект" className="max-h-96 mx-auto rounded-lg mb-4" />
                                <div className="flex justify-center space-x-4">
                                    <button
                                    onClick={() => setUploadedFile(null)}
                                    className="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition"
                                    >
                                    Удалить
                                    </button>
                                    <button
                                    onClick={recognizeText}
                                    disabled={processing}
                                    className="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition disabled:opacity-50 flex items-center space-x-2"
                                    >
                                    <Brain size={20} />
                                    <span>{processing ? 'Распознавание...' : 'Распознать текст'}</span>
                                    </button>
                                </div>
                                </div>
                            )}
                            </div>

                            {/* Распознанный текст */}
                            {recognizedText && (
                            <div className="mb-6">
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                Распознанный текст (можно редактировать)
                                </label>
                                <textarea
                                value={recognizedText}
                                onChange={(e) => setRecognizedText(e.target.value)}
                                rows={10}
                                className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 font-mono text-sm"
                                />
                            </div>
                            )}

                            {/* Кнопка сохранения */}
                            {recognizedText && (
                            <button
                                onClick={saveNote}
                                disabled={!newNote.title || !newNote.group || !newNote.author}
                                className="w-full py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed font-medium text-lg"
                            >
                                Сохранить конспект
                            </button>
                            )}
                        </div>
                        </div>
                    )}
                    </div>

                    {/* Информация */}
                    <div className="bg-white rounded-xl shadow-lg p-6">
                    <h3 className="text-lg font-bold text-gray-800 mb-4">О платформе</h3>
                    <div className="grid grid-cols-3 gap-6 text-center">
                        <div className="p-4">
                        <div className="bg-blue-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                            <Brain className="text-blue-600" size={24} />
                        </div>
                        <h4 className="font-semibold text-gray-800 mb-2">ИИ распознавание</h4>
                        <p className="text-sm text-gray-600">Автоматическое преобразование рукописного текста в цифровой формат</p>
                        </div>
                        <div className="p-4">
                        <div className="bg-green-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                            <Users className="text-green-600" size={24} />
                        </div>
                        <h4 className="font-semibold text-gray-800 mb-2">Открытая база</h4>
                        <p className="text-sm text-gray-600">Доступ к конспектам учеников из разных классов и школ</p>
                        </div>
                        <div className="p-4">
                        <div className="bg-purple-100 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                            <Star className="text-purple-600" size={24} />
                        </div>
                        <h4 className="font-semibold text-gray-800 mb-2">Оценка качества</h4>
                        <p className="text-sm text-gray-600">Учителя могут оценивать конспекты дистанционно</p>
                        </div>
                    </div>
                    </div>
                </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StudentNotesApp />);
    </script>
</body>
</html>
