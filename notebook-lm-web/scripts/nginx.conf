# /etc/nginx/sites-available/cortexnote
# CortexNote — Nginx reverse proxy configuration
#
# Setup:
#   1. sudo cp nginx.conf /etc/nginx/sites-available/cortexnote
#   2. sudo ln -s /etc/nginx/sites-available/cortexnote /etc/nginx/sites-enabled/
#   3. Edit 'server_name' below with your domain
#   4. sudo nginx -t && sudo systemctl reload nginx
#   5. sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name your-domain.com;  # <-- CHANGE THIS

    # Redirect HTTP to HTTPS (Certbot will add this automatically)
    # return 301 https://$server_name$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # File upload limit (for PDFs and images)
        client_max_body_size 50M;
    }
}
